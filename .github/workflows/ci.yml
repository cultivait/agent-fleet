name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx biome ci .
        continue-on-error: true   # advisory: style-only lint, never enforced (red since 1.8.0); build + test below are the real gate
      - run: npm run build
      - run: npm test
